<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SBYuva - Article Template</title>

  <!-- Google Fonts: Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: '#F47B20',
              dark: '#C85E10',
              light: '#FCEBD6',
            },
            secondary: '#8B1A1A',
            accent: '#D4A017',
            neutral: {
              bg: '#FAFAF7',
              surface: '#F5F0E8',
              border: '#E0D5C5',
            },
            text: {
              primary: '#1A1A1A',
              secondary: '#5A5A5A',
              muted: '#9A9A9A',
            },
            functional: {
              success: '#2E7D32',
              warning: '#F9A825',
              error: '#C62828',
              link: '#C85E10',
              linkHover: '#8B1A1A',
            }
          },
          fontFamily: {
            sans: ['Poppins', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style type="text/tailwindcss">
    @layer base {
      body {
        @apply bg-neutral-bg text-text-primary font-sans;
      }
      h1, h2, h3, h4, h5, h6 {
        @apply font-bold text-text-primary;
      }
      a {
        @apply text-functional-link hover:text-functional-linkHover transition-colors;
      }
    }
  </style>
</head>
<body class="flex flex-col min-h-screen">

  <!-- Navbar will be injected here -->
  <div id="navbar-placeholder"></div>

  <!-- Main Content -->
  <main class="flex-grow flex items-center justify-center p-8">
    <div class="text-center">
      <h1 class="text-4xl font-bold mb-4">Article Template</h1>
      <p class="text-xl text-text-secondary">Coming Soon</p>
    </div>
  </main>

  <script src="components.js"></script>
</body>
</html>
